baseURL: https://yuyliu.github.io/
languageCode: en-us
theme: PaperMod
title: Yuyang Liu

buildDrafts: false
buildFuture: false
buildExpired: false
enableRobotsTXT: true
pygmentsUseClasses: true # https://github.com/adityatelange/hugo-PaperMod/wiki/FAQs#using-hugos-syntax-highlighter-chroma

markup:
  highlight:
    noClasses: false
    # anchorLineNos: true
    # codeFences: true
    # guessSyntax: true
    # lineNos: true
    # style: monokai

menu:
  main:
    - identifier: publications
      name: Publications
      url: /publications
      weight: 10
    - identifier: presentations
      name: Presentations
      url: /presentations
      weight: 20
    # - identifier: example
    #   name: example.org
    #   url: https://example.org
    #   weight: 30

minify:
  disableXML: true
  minifyOutput: true

params:
  DateFormat: January 2, 2006
  author: Yuyang Liu
  # author: ["Me", "You"] # multiple authors
  defaultTheme: auto # dark, light
  description: Yuyang Liu’s website
  env: production # to enable google analytics, opengraph, twitter-cards and schema
  keywords: [Yuyang, Liu, Yale, Linguistics]
  title: Yuyang Liu
  # images: ["<link or path of image for opengraph, twitter-cards>"]
  
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: false
  ShowPostNavLinks: true
  ShowReadingTime: true
  ShowRssButtonInSectionTermList: true
  ShowShareButtons: true
  ShowWordCount: true
  UseHugoToc: true
  disableScrollToTop: false
  disableSpecial1stPost: false
  disableThemeToggle: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: false
  tocopen: false

  analytics:
    google:
      SiteVerificationTag: "G-HWTZRY35WH"
    # bing:
    #   SiteVerificationTag: "XYZabc"
    # yandex:
    #   SiteVerificationTag: "XYZabc"

  assets:
    apple_touch_icon: /apple-touch-icon.png
    # disableHLJS: true # to disable highlight.js
    # disableFingerprinting: true
    favicon: /favicon.ico
    favicon16x16: /favicon-16x16.png
    favicon32x32: /favicon-32x32.png
    safari_pinned_tab: /safari-pinned-tab.svg

  cover:
    hidden: true # to hide everywhere but not in structured data
    hiddenInList: true # to hide on list pages and home
    hiddenInSingle: true # to hide on single page

  # editPost:
  #   Text: "Suggest Changes"
  #   URL: "https://github.com/<path_to_repo>/content"
  #   appendFilePath: true # to append file path to Edit link

  # fuseOpts: # https://fusejs.io/api/options.html
