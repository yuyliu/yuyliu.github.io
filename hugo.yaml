  #   limit: 10 # https://www.fusejs.io/api/methods.html#search
  #   keys: ["title", "permalink", "summary", "content"]

  label:
    text: Home
    icon: /android-chrome-512x512.png
    iconHeight: 32

  socialIcons:
    - name: email
      url: mailto:yuyang.liu.yl2472@yale.edu
    - name: googlescholar
      url: https://scholar.google.com/citations?user=rsRPCdAAAAAJ

  # home info mode
  homeInfoParams:
    Title: "Hello! My name is Yuyang Liu. \U0001F44B"
    Content: "I am a PhD student in Linguistics at Yale University. My website is currently under construction, but exciting updates are on the way. Stay tuned! If you’ve arrived here through the link on my NELS 55 poster, you can download the poster [here](/presentations/Liu%20-%202024%20-%20Mandarin%20Chinese%20ma%20-%20poster.pdf)."
 
  # profile mode
  profileMode:
